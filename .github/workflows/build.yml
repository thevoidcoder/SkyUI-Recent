name: Build Plugin

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'  # Trigger on version tags like v0.1.2
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # lets you trigger manually from the GitHub web UI

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from VERSION file
        id: get_version
        shell: pwsh
        run: |
          $version = Get-Content -Path "${{ github.workspace }}/VERSION" -Raw
          $version = $version.Trim()
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"

      # Cache vcpkg downloads + built packages so repeat builds are fast
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '6015c398c7789565d4fa548f1fc54f651c018b11'
          vcpkgJsonGlob: '**/skse_plugin/vcpkg.json'

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/skse_plugin/build/vcpkg_installed
          key: vcpkg-x64-windows-static-md-${{ hashFiles('skse_plugin/vcpkg.json', 'skse_plugin/vcpkg-configuration.json', 'skse_plugin/ports/**') }}
          restore-keys: |
            vcpkg-x64-windows-static-md-

      - name: Install vcpkg packages
        shell: pwsh
        run: |
          $tripletDir = "${{ github.workspace }}/skse_plugin/build/vcpkg_installed/x64-windows-static-md"
          if (Test-Path $tripletDir) {
            Write-Host "Cache restored – skipping vcpkg install."
          } else {
            Write-Host "No cache – running vcpkg install..."
            New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/skse_plugin/build" | Out-Null
            & "$env:VCPKG_ROOT/vcpkg.exe" install `
              --triplet x64-windows-static-md `
              "--x-manifest-root=${{ github.workspace }}/skse_plugin" `
              "--x-install-root=${{ github.workspace }}/skse_plugin/build/vcpkg_installed" `
              "--overlay-ports=${{ github.workspace }}/skse_plugin/ports"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Configure CMake
        run: |
          cmake -B "${{ github.workspace }}/skse_plugin/build" `
                -S "${{ github.workspace }}/skse_plugin" `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" `
                -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
                -DVCPKG_MANIFEST_INSTALL=OFF

      - name: Build
        run: |
          cmake --build "${{ github.workspace }}/skse_plugin/build" --config Release

      - name: Locate DLL
        id: find_dll
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path "${{ github.workspace }}/skse_plugin/build" `
                               -Filter "SkyUIRecentSort.dll" -Recurse |
                 Select-Object -First 1 -ExpandProperty FullName
          echo "dll_path=$dll" >> $env:GITHUB_OUTPUT

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyUIRecentSort-dll
          path: ${{ steps.find_dll.outputs.dll_path }}
          if-no-files-found: error

      # Generate ESP plugin
      - name: Generate ESP
        shell: pwsh
        run: |
          python3 "${{ github.workspace }}/tools/generate_esp.py"
          if (-not (Test-Path "${{ github.workspace }}/SkyUIRecentSort.esp")) {
            throw "ESP generation failed"
          }

      # Download Papyrus Compiler
      - name: Download Papyrus Compiler
        shell: pwsh
        run: |
          $compilerUrl = "https://github.com/russo-2025/papyrus-compiler/releases/latest/download/papyrus-compiler-windows.zip"
          $compilerZip = "${{ github.workspace }}/papyrus-compiler.zip"
          $compilerDir = "${{ github.workspace }}/papyrus-compiler"
          
          Write-Host "Downloading Papyrus Compiler..."
          Invoke-WebRequest -Uri $compilerUrl -OutFile $compilerZip
          
          Write-Host "Extracting Papyrus Compiler..."
          Expand-Archive -Path $compilerZip -DestinationPath $compilerDir -Force
          
          # Find the papyrus.exe
          $papyrusExe = Get-ChildItem -Path $compilerDir -Filter "papyrus.exe" -Recurse | Select-Object -First 1
          if (-not $papyrusExe) {
            throw "papyrus.exe not found in downloaded archive"
          }
          
          echo "papyrus_path=$($papyrusExe.FullName)" >> $env:GITHUB_OUTPUT
        id: download_compiler

      # Compile Papyrus Scripts
      - name: Compile Papyrus Scripts
        shell: pwsh
        run: |
          $papyrus = "${{ steps.download_compiler.outputs.papyrus_path }}"
          $root = "${{ github.workspace }}"
          $scriptsOut = "$root/scripts"
          
          Write-Host "Compiling Papyrus scripts..."
          
          # Compile SkyUIRecentSort_MCM.psc
          & $papyrus compile -i "$root/scripts/source/SkyUIRecentSort_MCM.psc" -o "$scriptsOut"
          if ($LASTEXITCODE -ne 0) { throw "Failed to compile SkyUIRecentSort_MCM.psc" }
          
          # Compile SkyUIRecentSort_Quest.psc
          & $papyrus compile -i "$root/scripts/source/SkyUIRecentSort_Quest.psc" -o "$scriptsOut"
          if ($LASTEXITCODE -ne 0) { throw "Failed to compile SkyUIRecentSort_Quest.psc" }
          
          # Compile SUIR_AcquiredBridge.psc
          & $papyrus compile -i "$root/papyrus/Scripts/Source/SUIR_AcquiredBridge.psc" -o "$scriptsOut"
          if ($LASTEXITCODE -ne 0) { throw "Failed to compile SUIR_AcquiredBridge.psc" }
          
          # Verify .pex files were created
          if (-not (Test-Path "$scriptsOut/SkyUIRecentSort_MCM.pex")) { throw "SkyUIRecentSort_MCM.pex not created" }
          if (-not (Test-Path "$scriptsOut/SkyUIRecentSort_Quest.pex")) { throw "SkyUIRecentSort_Quest.pex not created" }
          if (-not (Test-Path "$scriptsOut/SUIR_AcquiredBridge.pex")) { throw "SUIR_AcquiredBridge.pex not created" }
          
          Write-Host "All Papyrus scripts compiled successfully"

      # Full packaged zip (with ESP and compiled Papyrus .pex)
      - name: Package mod zip
        shell: pwsh
        run: |
          $root     = "${{ github.workspace }}"
          $staging  = "$root/staging"
          $dll      = "${{ steps.find_dll.outputs.dll_path }}"
          $version  = "${{ steps.get_version.outputs.version }}"

          New-Item -ItemType Directory -Path "$staging/SKSE/Plugins"              -Force | Out-Null
          New-Item -ItemType Directory -Path "$staging/Scripts"                   -Force | Out-Null
          New-Item -ItemType Directory -Path "$staging/Scripts/Source"            -Force | Out-Null
          New-Item -ItemType Directory -Path "$staging/Interface/Translations"    -Force | Out-Null

          # Copy DLL
          Copy-Item $dll "$staging/SKSE/Plugins/SkyUIRecentSort.dll"
          
          # Copy ESP plugin
          Copy-Item "$root/SkyUIRecentSort.esp" "$staging/SkyUIRecentSort.esp"
          
          # Copy compiled Papyrus scripts (.pex)
          Copy-Item "$root/scripts/SUIR_AcquiredBridge.pex"     "$staging/Scripts/SUIR_AcquiredBridge.pex"
          Copy-Item "$root/scripts/SkyUIRecentSort_MCM.pex"     "$staging/Scripts/SkyUIRecentSort_MCM.pex"
          Copy-Item "$root/scripts/SkyUIRecentSort_Quest.pex"   "$staging/Scripts/SkyUIRecentSort_Quest.pex"
          
          # Copy Papyrus source scripts (for reference/modding)
          Copy-Item "$root/papyrus/Scripts/Source/SUIR_AcquiredBridge.psc"  "$staging/Scripts/Source/SUIR_AcquiredBridge.psc"
          Copy-Item "$root/scripts/source/SkyUIRecentSort_MCM.psc"          "$staging/Scripts/Source/SkyUIRecentSort_MCM.psc"
          Copy-Item "$root/scripts/source/SkyUIRecentSort_Quest.psc"        "$staging/Scripts/Source/SkyUIRecentSort_Quest.psc"
          Copy-Item "$root/scripts/source/SKI_ConfigBase.psc"               "$staging/Scripts/Source/SKI_ConfigBase.psc"
          
          # Copy MCM translations
          Copy-Item "$root/Interface/Translations/SkyUIRecentSort_MCM_ENGLISH.txt" "$staging/Interface/Translations/SkyUIRecentSort_MCM_ENGLISH.txt"
          
          # Copy documentation
          Copy-Item "$root/README.md" "$staging/README.md" -ErrorAction SilentlyContinue

          Compress-Archive -Path "$staging/*" -DestinationPath "$root/SkyUIRecentSort-v$version.zip"
          echo "Created: SkyUIRecentSort-v$version.zip"

      - name: Upload mod zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyUIRecentSort-v${{ steps.get_version.outputs.version }}
          path: SkyUIRecentSort-v${{ steps.get_version.outputs.version }}.zip
          if-no-files-found: error
